default:
  image: node:24

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

variables:
  HUSKY: "0"
  NPM_CONFIG_CACHE: .npm
  GIT_DEPTH: "0"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - /root/.cache/ms-playwright/

verify:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  script:
    - npm ci
    - npx playwright install --with-deps chromium
    - npm run lint
    - npm run typecheck
    - npm test
    - npm run build
