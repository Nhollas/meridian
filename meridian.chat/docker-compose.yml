services:
  chat:
    build:
      context: .
      args:
        GITLAB_PACKAGES_TOKEN: ${GITLAB_PACKAGES_TOKEN}
    ports:
      - "3200:3200"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MERIDIAN_AUTH_ISSUER=${MERIDIAN_AUTH_ISSUER:-https://cicd-meridian-oauth-server-shadow.vassily.io/realms/meridian}
      - MERIDIAN_AUTH_CLIENT_ID=${MERIDIAN_AUTH_CLIENT_ID:-meridian-cli}
    volumes:
      - meridian-state:/root/.meridian

volumes:
  meridian-state:
