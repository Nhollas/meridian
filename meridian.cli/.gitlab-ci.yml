default:
  image: node:24

workflow:
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never

variables:
  HUSKY: "0"
  NPM_CONFIG_CACHE: .npm
  GIT_DEPTH: "0"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

verify:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  script:
    - npm ci
    - npm run lint
    - npm run typecheck
    - npm test
    - npm run build

release:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: never
  script:
    - npm ci
    - npm run typecheck
    - npm run build
    - apt-get update && apt-get install -y git
    - git config user.name "${GITLAB_RELEASE_USER_NAME:-Meridian Release Bot}"
    - git config user.email "${GITLAB_RELEASE_USER_EMAIL:-meridian-cli-release-bot@example.com}"
    - git remote set-url origin "https://oauth2:${GITLAB_RELEASE_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - |
      printf "@comparethemarket:registry=%s/projects/%s/packages/npm/\n//%s/api/v4/projects/%s/packages/npm/:_authToken=%s\n" \
        "$CI_API_V4_URL" \
        "$CI_PROJECT_ID" \
        "$CI_SERVER_HOST" \
        "$CI_PROJECT_ID" \
        "$CI_JOB_TOKEN" > .npmrc.release
    - export NPM_CONFIG_USERCONFIG="$CI_PROJECT_DIR/.npmrc.release"
    - npm run release

release-page:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/'
    - when: never
  script:
    - node scripts/render-release-notes.js CHANGELOG.md > release-notes.md
    - |
      release_api="$CI_API_V4_URL/projects/$CI_PROJECT_ID/releases"
      release_url="$release_api/$CI_COMMIT_TAG"

      if curl --silent --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" "$release_url" >/dev/null; then
        method="PUT"
        url="$release_url"
      else
        method="POST"
        url="$release_api"
      fi

      curl --silent --show-error --fail-with-body \
        --request "$method" \
        --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --data-urlencode "name=Meridian CLI $CI_COMMIT_TAG" \
        --data-urlencode "tag_name=$CI_COMMIT_TAG" \
        --data-urlencode "description@release-notes.md" \
        "$url"
  artifacts:
    when: always
    paths:
      - release-notes.md
